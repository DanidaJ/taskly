# Security headers, shared across locations.
#
# nginx does NOT inherit add_header directives into a location block that
# defines its own add_header, so this snippet is `include`d in every location
# that sets other headers (static assets, index.html). Keeping the headers here
# means the (long) CSP is defined exactly once.
#
# `always` ensures the headers are emitted on error responses too.

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Content-Security-Policy
#   script-src blocks inline scripts (no 'unsafe-inline'); www.gstatic.com is
#     required by the FCM service worker's importScripts().
#   style-src allows 'unsafe-inline' for the inline <style> in index.html and
#     the fonts.cdnfonts.com @import; tighten by moving those into a CSS file.
#   connect-src permits Supabase (REST + realtime wss) and Google/FCM APIs.
#   If the API is served from a different origin than the app, add it here.
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.cdnfonts.com; font-src 'self' data: https://fonts.cdnfonts.com https://*.cdnfonts.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.googleapis.com https://fcm.googleapis.com; worker-src 'self'; manifest-src 'self'" always;
